name: Build firmware

# Manually triggered: builds every entry in builds.yaml and commits the
# resulting <name>.zip back to this repo root.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout builds repo
        uses: actions/checkout@v4

      - name: Install spangap
        run: |
          set -eu
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/spangap/spangap/refs/heads/main/spangap \
            -o "$HOME/.local/bin/spangap"
          chmod +x "$HOME/.local/bin/spangap"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build all images
        run: |
          set -eu
          # Build in a workspace outside the checkout so cloned straddles never
          # mix into this repo. make-builds writes each flasher.zip to
          # <this checkout>/<name>.zip.
          spangap init "$HOME/spangap-ws"
          cd "$HOME/spangap-ws"
          spangap make-builds "$GITHUB_WORKSPACE"

      - name: Commit images
        run: |
          set -eu
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./*.zip
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Build firmware images ($(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push
          fi
